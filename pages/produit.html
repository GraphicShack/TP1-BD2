<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Travail de session - BD2 | Produits</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">Travail de session - BD2</div>
            <nav class="navbar" aria-label="Navigation principale">
                <a href="/">Accueil</a>
                <a href="/client">Clients</a>
                <a href="/produit">Produits</a>
                <a href="/reservation">Réservation</a>
                <a href="/journal">Journal</a>
            </nav>
        </div>
    </header>

    <main class="container main-content full-width">
        <section class="card form-section">
            <h2 id="formTitle">Ajouter un produit</h2>
            <form id="addProduitForm">
                <input type="hidden" name="id" id="produitId" />
                <div class="form-fields">
                    <input type="text" name="nom" id="produitNom" placeholder="Nom du produit" required />
                    <input type="number" name="prix" id="produitPrix" placeholder="Prix" min="0.01" step="0.01" required />
                    <input type="number" name="stock" id="produitStock" placeholder="Stock" min="0" required />
                </div>
                <div class="form-buttons">
                    <button type="submit" id="submitButton">Ajouter</button>
                    <button type="button" id="cancelEdit" style="display:none;">Annuler</button>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Liste des produits</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prix</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="produitTable">
                    <tr><td colspan="5">Chargement...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Travail de session - BD2</p>
        </div>
    </footer>
    <script src="/js/produits.js"></script>
</body>
</html>
